server {
    listen 80;
    server_name localhost;

    # Serve HTML pages
    location / {
        root /app/www;
        index index.html index.htm;
        
        # Add security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        
        # Enable caching for static assets
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Serve cleaner output files
    location /output/ {
        alias /app/output/;
        autoindex on;
        autoindex_format html;
        autoindex_exact_size off;
        autoindex_localtime on;
        
        # Add CORS headers if needed
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept" always;
        
        # Set proper content type for text files
        location ~* \.(txt|log|csv)$ {
            add_header Content-Type text/plain;
        }
        
        # JSON output
        location ~* \.(json)$ {
            add_header Content-Type application/json;
        }
    }

    # API endpoint to get latest cleaner results
    location /api/results {
        alias /app/output/results.txt;
        default_type text/plain;
        
        # Allow CORS for API calls
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /404.html {
        root /app/www;
    }
    
    location = /50x.html {
        root /app/www;
    }

    # Logging
    access_log /var/log/nginx/cleaner-access.log;
    error_log /var/log/nginx/cleaner-error.log;

    # Client body size limit
    client_max_body_size 10M;
}