apiVersion: apps/v1
kind: Deployment
metadata:
  name: cleaner-113
  labels:
    app: cleaner-113
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cleaner-113
  template:
    metadata:
      labels:
        app: cleaner-113
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: cleaner-container
        image: cleaner-app:v1
        imagePullPolicy: IfNotPresent

        ports:
        - name: http
          containerPort: 80
          protocol: TCP

        # Check the root (/) because Nginx serves index.html there.
        # This prevents the "CrashLoopBackOff" caused by a missing /health page.
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10

        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"

        volumeMounts:
        # Output folder for your analysis results
        - name: result-data
          mountPath: /app/output
        # Work folder for your 'curl' downloads and GitHub repos
        - name: work-data
          mountPath: /data/work

      volumes:
      # Use HostPath so files survive when your computer restarts.
      # Change the path below to a valid folder on your Windows machine.
      - name: result-data
        hostPath:
          path: /c/dev/cleaner/output
          type: DirectoryOrCreate
      - name: work-data
        hostPath:
          path: /c/dev/cleaner/work
          type: DirectoryOrCreate

---
apiVersion: v1
kind: Service
metadata:
  name: cleaner-113-service
spec:
  type: LoadBalancer
  selector:
    app: cleaner-113
  ports:
  - name: http
    protocol: TCP
    port: 8091      # <--- The port you use in your browser
    targetPort: 80  # <--- Still 80, because that is what Nginx uses inside the pod
